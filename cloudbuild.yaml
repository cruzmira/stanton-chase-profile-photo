steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cbre-profile-photo', '.']
    dir: 'cbre---profile-photo'

  # 2. Push image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cbre-profile-photo']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'run'
      - 'deploy'
      - 'cbre-profile-photo'
      - '--image=gcr.io/$PROJECT_ID/cbre-profile-photo'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--timeout=300'
      - '--set-env-vars=API_KEY=${_API_KEY}'
    entrypoint: 'gcloud'

images:
  - 'gcr.io/$PROJECT_ID/cbre-profile-photo'

substitutions:
  _API_KEY: ''
